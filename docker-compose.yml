services:
  mongodb:
    image: mongo:6.0
    container_name: isp-mongodb
    ports:
      - "127.0.0.1:27017:27017"
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
      MONGO_INITDB_DATABASE: isp_management
    volumes:
      - mongodb_data:/data/db
    networks:
      - isp-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  radius-db:
    image: mysql:8.0
    container_name: isp-radius-db
    ports:
      - "127.0.0.1:3306:3306"
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASS}
      MYSQL_DATABASE: radius
      MYSQL_USER: radius
      MYSQL_PASSWORD: ${RADIUS_DB_PASSWORD}
    volumes:
      - radius_data:/var/lib/mysql
    networks:
      - isp-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: isp-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - isp-network

  freeradius:
    image: freeradius/freeradius-server:latest
    container_name: isp-freeradius
    restart: unless-stopped
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
      - "3799:3799/udp"
    volumes:
      - ./freeradius/raddb:/etc/freeradius:ro
      - ./freeradius/scripts:/usr/local/bin/scripts
    depends_on:
      radius-db:
        condition: service_healthy
    networks:
      - isp-network
    command: >
      sh -c "apt-get update -qq && apt-get install -y -qq curl && freeradius -f"
  app:
    build: ./ISP_BACKEND
    container_name: isp-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASS}@mongodb:27017/isp_management?authSource=admin
      RADIUS_DB_HOST: ${RADIUS_DB_HOST}
      RADIUS_DB_USER: ${RADIUS_DB_USER}
      RADIUS_DB_PASSWORD: ${RADIUS_DB_PASSWORD}
      RADIUS_DB_NAME: ${RADIUS_DB_NAME}
      SESSION_SECRET: ${SESSION_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      RADIUS_SECRET: ${RADIUS_SECRET}
      RADIUS_SERVER_IP: ${RADIUS_SERVER_IP}
      DISABLED_POOL_CIDR: ${DISABLED_POOL_CIDR}
      CAPTIVE_PORTAL_IP: ${CAPTIVE_PORTAL_IP}
      CAPTIVE_PORTAL_PORT: ${CAPTIVE_PORTAL_PORT}
      CORS_ORIGIN: ${CORS_ORIGIN}
      MPESA_CONSUMER_KEY: ${MPESA_CONSUMER_KEY}
      MPESA_CONSUMER_SECRET: ${MPESA_CONSUMER_SECRET}
      MPESA_SHORTCODE: ${MPESA_SHORTCODE}
      MPESA_ENVIRONMENT: ${MPESA_ENVIRONMENT}
      MPESA_PASSKEY: ${MPESA_PASSKEY}
      INITIATOR_PASSWORD: ${INITIATOR_PASSWORD}
      KOPOKOPO_ENVIRONMENT: ${KOPOKOPO_ENVIRONMENT}
      KOPOKOPO_CLIENT_ID: ${KOPOKOPO_CLIENT_ID}
      KOPOKOPO_CLIENT_SECRET: ${KOPOKOPO_CLIENT_SECRET}
      KOPOKOPO_API_KEY: ${KOPOKOPO_API_KEY}
      KOPOKOPO_TILL_NUMBER: ${KOPOKOPO_TILL_NUMBER}
      KOPOKOPO_MERCHANT_BANK_ACCOUNT: ${KOPOKOPO_MERCHANT_BANK_ACCOUNT}
      BASE_URL: ${BASE_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      API_URL: ${API_URL}
      CALLBACK_BASE_URL: ${CALLBACK_BASE_URL}
      REDIRECT_HOST: ${REDIRECT_HOST}
      MOBILE_SASA_API_TOKEN: ${MOBILE_SASA_API_TOKEN}
      MOBILE_SASA_DEFAULT_SENDER: ${MOBILE_SASA_DEFAULT_SENDER}
      MOBILE_SASA_BASE_URL: ${MOBILE_SASA_BASE_URL}
      RADIUS_WEBHOOK_SECRET: ${RADIUS_WEBHOOK_SECRET}
      INTER_SYSTEM_SECRET: ${INTER_SYSTEM_SECRET}
      OPERATIONS_URI: ${OPERATIONS_URI}
    depends_on:
      mongodb:
        condition: service_healthy
      radius-db:
        condition: service_healthy
    networks:
      - isp-network
    volumes:
      - ./ISP_BACKEND/uploads:/app/uploads
      - ./ISP_BACKEND/logs:/app/logs

  redirect:
    build: ./ISP_BACKEND
    container_name: isp-redirect
    restart: unless-stopped
    ports:
      - "8081:8081"                       # External port for MikroTik redirection
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: 8081
      MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASS}@mongodb:27017/isp_management?authSource=admin
      RADIUS_DB_HOST: ${RADIUS_DB_HOST}
      RADIUS_DB_USER: ${RADIUS_DB_USER}
      RADIUS_DB_PASSWORD: ${RADIUS_DB_PASSWORD}
      RADIUS_DB_NAME: ${RADIUS_DB_NAME}
      FRONTEND_URL: ${FRONTEND_URL}
      SUPPORT_PHONE: ${SUPPORT_PHONE:-0700-000-000}
      BASE_URL: ${BASE_URL}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-support@skylinknetworks.co.ke}
      RADIUS_WEBHOOK_SECRET: ${RADIUS_WEBHOOK_SECRET}
    depends_on:
      mongodb:
        condition: service_healthy
      radius-db:
        condition: service_healthy
    networks:
      - isp-network
    command: node redirect-server.js
    volumes:
      - ./ISP_BACKEND/logs:/app/logs

  frontend:
    build:
      context: ./ISP_FRONTEND
      args:
        NEXT_PUBLIC_API_URL: https://billing.skylinknetworks.co.ke/api
    container_name: isp-frontend
    restart: unless-stopped
    networks:
      - isp-network

  nginx:
    image: nginx:alpine
    container_name: isp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - /var/www/certbot:/var/www/certbot
    depends_on:
      - app
      - frontend
    networks:
      - isp-network

  certbot:
    image: certbot/certbot
    container_name: isp-certbot
    volumes:
      - ./ssl:/etc/letsencrypt
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /var/www/certbot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"
    depends_on:
      - nginx
    networks:
      - isp-network

volumes:
  mongodb_data:
  radius_data:
  redis_data:

networks:
  isp-network:
    driver: bridge





