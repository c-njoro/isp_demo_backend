services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: isp-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: isp_management
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - isp-network

  # MySQL for RADIUS
  radius-db:
    image: mysql:8.0
    container_name: isp-radius-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: radius123
      MYSQL_DATABASE: radius
      MYSQL_USER: radius
      MYSQL_PASSWORD: radius123
    ports:
      - "3306:3306"
    volumes:
      - radius_data:/var/lib/mysql
    networks:
      - isp-network

  # Redis (optional - for sessions/caching)
  redis:
    image: redis:7-alpine
    container_name: isp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - isp-network

  # ISP Management Backend
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: isp-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/isp_management?authSource=admin
      RADIUS_DB_HOST: radius-db
      RADIUS_DB_USER: radius
      RADIUS_DB_PASSWORD: radius123
      RADIUS_DB_NAME: radius
      SESSION_SECRET: your-secret-key-change-in-production
    depends_on:
      - mongodb
      - radius-db
    volumes:
      # Mount source code for hot reload in development
      - .:/app
      - /app/node_modules
    networks:
      - isp-network
    command: npm run start

  # ISP Management Frontend
  frontend:
    build:
      context: ../isp_frontend
      dockerfile: Dockerfile
    container_name: isp-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://app:5000
    depends_on:
      - app
    networks:
      - isp-network

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: isp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - isp-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  radius_data:
    driver: local
  redis_data:
    driver: local

networks:
  isp-network:
    driver: bridge
